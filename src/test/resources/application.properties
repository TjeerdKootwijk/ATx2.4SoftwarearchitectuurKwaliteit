# Disable Flyway so no real DB connection is needed
spring.flyway.enabled=false

# Use H2 in-memory database instead of PostgreSQL
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop


# AES key required by AesEncryptionConverter (test value, 32 bytes Base64)
AES_ENCRYPTION_KEY=EZLzg025mt6HbHesB93kP1X60RMYml1fsNY76P1ibpQ=

# Provider stubs (required by @Value in provider clients)
providers.base-url=http://localhost:1337
providers.student-group=c1
providers.swiftsend.api-key=test-key
providers.securepost.client-id=test-client
providers.securepost.client-secret=test-secret
providers.legacylink.username=test-user
providers.legacylink.password=test-pass
providers.asyncflow.api-key=test-asyncflow-key
