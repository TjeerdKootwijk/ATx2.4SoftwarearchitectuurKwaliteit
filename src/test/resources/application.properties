# Test datasource — H2 in-memory als er geen SPRING_DATASOURCE_URL env var is (lokaal),
# PostgreSQL als de CI die env var wel zet. Driver en dialect worden automatisch afgeleid van de URL.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.jpa.hibernate.ddl-auto=create-drop

# Flyway uitgeschakeld — schema wordt aangemaakt via Hibernate ddl-auto
spring.flyway.enabled=false

# AES-256 testsleutel (32 bytes, alleen voor tests)
AES_ENCRYPTION_KEY=EZLzg025mt6HbHesB93kP1X60RMYml1fsNY76P1ibpQ=

# Tenant stub — OpenMRS niet bereikbaar in tests; TenantInitializer logt alleen een waarschuwing
OPENMRS_TENANT_ID=test-tenant
OPENMRS_ORGANIZATION_NAME=Test Organisatie
OPENMRS_BASE_URL=http://localhost:1
OPENMRS_USERNAME=admin
OPENMRS_PASSWORD=admin
OPENMRS_NOTIFICATION_PROVIDER=SWIFTSEND
OPENMRS_TIMEZONE=UTC

# Provider stub-waarden — directe waarden zodat geen env-vars nodig zijn tijdens tests
providers.base-url=http://localhost:1
providers.student-group=test-group
providers.swiftsend.api-key=test-swiftsend-key
providers.securepost.client-id=test-securepost-id
providers.securepost.client-secret=test-securepost-secret
providers.legacylink.username=test-legacylink-user
providers.legacylink.password=test-legacylink-pass
providers.asyncflow.api-key=test-asyncflow-key
