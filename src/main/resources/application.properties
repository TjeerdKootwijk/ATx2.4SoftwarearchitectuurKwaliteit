# Test Configuration - Overrides main application.properties

# Logging
logging.level.root=INFO
logging.level.com.example.atx24softwarearchitectuurkwaliteit=DEBUG

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Jackson JSON
spring.jackson.default-property-inclusion=non_null

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Scheduling
spring.task.scheduling.pool.size=2
spring.task.scheduling.thread-name-prefix=task-

# Appointment Polling Configuration
app.polling.enabled=false
app.polling.interval-seconds=300
app.polling.initial-delay-seconds=60

# Multitenancy
app.multitenancy.enabled=true

# SwiftSend - Test Defaults
providers.base-url=http://localhost:1337
providers.student-group= c1
providers.swiftsend.api-key= your-api-key-here
