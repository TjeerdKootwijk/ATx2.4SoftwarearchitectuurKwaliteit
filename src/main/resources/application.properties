# Logging
logging.level.root=INFO
logging.level.com.example.atx24softwarearchitectuurkwaliteit=DEBUG

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Jackson JSON
spring.jackson.default-property-inclusion=non_null

# =========================
# ACTUATOR + PROMETHEUS
# =========================

# Expose all actuator endpoints
management.endpoints.web.exposure.include=*

# Show health details
management.endpoint.health.show-details=always

# Enable Prometheus export
management.prometheus.metrics.export.enabled=true

# Application tag
management.metrics.tags.application=atx24-app

# Optional: custom actuator base path
# management.endpoints.web.base-path=/actuator

# =========================
# SCHEDULING
# =========================

spring.task.scheduling.pool.size=2
spring.task.scheduling.thread-name-prefix=task-

# =========================
# APPOINTMENT POLLING
# =========================

app.polling.enabled=false
app.polling.interval-seconds=300
app.polling.initial-delay-seconds=60

# =========================
# MULTITENANCY
# =========================

app.multitenancy.enabled=true

# =========================
# PROVIDERS
# =========================

providers.base-url=http://localhost:1337
providers.student-group=c1

providers.swiftsend.api-key=your-api-key-here

providers.securepost.client-id=securepost-client-id
providers.securepost.client-secret=securepost-secret-key