# Logging
logging.level.root=INFO
logging.level.com.example.atx24softwarearchitectuurkwaliteit=DEBUG

# =========================
# DATABASE (PostgreSQL)
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/atx24db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# =========================
# ENCRYPTION (NFR5)
# =========================
# AES-256-GCM key, Base64-encoded (32 bytes).
# Generate with: openssl rand -base64 32
# In production: inject via AES_ENCRYPTION_KEY environment variable.
AES_ENCRYPTION_KEY=${AES_ENCRYPTION_KEY:EZLzg025mt6HbHesB93kP1X60RMYml1fsNY76P1ibpQ=}

# =========================
# TLS 1.3 (NFR5 — transport)
# =========================
# HTTPS on port 8443; TLS 1.3 only (no TLS 1.0/1.1/1.2 downgrade).
# Dev keystore: src/main/resources/keystore.p12 (self-signed, SHA-256 RSA 2048).
# Production: replace keystore path + password with environment-injected values.
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=atx24
server.ssl.protocol=TLSv1.3
server.ssl.enabled-protocols=TLSv1.3

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Jackson JSON
spring.jackson.default-property-inclusion=non_null

# =========================
# ACTUATOR + PROMETHEUS
# =========================

# Expose all actuator endpoints
management.endpoints.web.exposure.include=*

# Show health details
management.endpoint.health.show-details=always

# Enable Prometheus export
management.prometheus.metrics.export.enabled=true

# Application tag
management.metrics.tags.application=atx24-app

# Optional: custom actuator base path
# management.endpoints.web.base-path=/actuator

# =========================
# SCHEDULING
# =========================

spring.task.scheduling.pool.size=2
spring.task.scheduling.thread-name-prefix=task-

# =========================
# APPOINTMENT POLLING
# =========================

app.polling.enabled=false
app.polling.interval-seconds=300
app.polling.initial-delay-seconds=60

# =========================
# MULTITENANCY
# =========================

app.multitenancy.enabled=true

# =========================
# PROVIDERS
# =========================

providers.base-url=http://localhost:1337
providers.student-group=c1

providers.swiftsend.api-key=your-api-key-here

providers.securepost.client-id=securepost-client-id
providers.securepost.client-secret=securepost-secret-key
providers.legacylink.username=legacylink-user
providers.legacylink.password=legacylink-password
providers.asyncflow.api-key=${PROVIDERS_ASYNCFLOW_API_KEY:your-asyncflow-api-key-here}
