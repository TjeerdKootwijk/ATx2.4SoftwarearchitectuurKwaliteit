
services:
  # Fake messaging providers (SwiftSend / LegacyLink / AsyncFlow / SecurePost)
  fakeMessageProvider:
    image: ghcr.io/avansict/in2.4-fakecomworld:main
    ports:
      - "1337:8080"

  # Fake OpenMRS REST server — simuleert /ws/rest/v1/appointments voor pipeline-tests
  fake-openmrs:
    build:
      context: ./fake-openmrs
      dockerfile: Dockerfile
    container_name: atx24-fake-openmrs
    environment:
      FAKE_OPENMRS_PORT: 8090
      FAKE_APPOINTMENT_COUNT: ${FAKE_APPOINTMENT_COUNT:-3}
      FAKE_APPOINTMENT_HOURS: ${FAKE_APPOINTMENT_HOURS:-2}
      FAKE_PATIENT_NAME: ${FAKE_PATIENT_NAME:-Test Patient}
      FAKE_APPOINTMENT_LOCATION: ${FAKE_APPOINTMENT_LOCATION:-Polikliniek Kamer 3B}
      FAKE_APPOINTMENT_TYPE: ${FAKE_APPOINTMENT_TYPE:-Consultatie}
      FAKE_APPOINTMENT_STATUS: ${FAKE_APPOINTMENT_STATUS:-Scheduled}
      FAKE_APPOINTMENT_COMMENTS: ${FAKE_APPOINTMENT_COMMENTS:-Nuchter komen}
    ports:
      - "8090:8090"
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: atx24-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: atx24db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: atx24-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atx24-app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      fakeMessageProvider:
        condition: service_started
      fake-openmrs:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/atx24db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      PROVIDERS_BASE_URL: http://fakeMessageProvider:8080
      PROVIDERS_STUDENT_GROUP: groupc1
      PROVIDERS_SWIFTSEND_API_KEY: your-api-key-here
      PROVIDERS_SECUREPOST_CLIENT_ID: securepost-client-id
      PROVIDERS_SECUREPOST_CLIENT_SECRET: securepost-secret-key
      PROVIDERS_ASYNCFLOW_API_KEY: ${PROVIDERS_ASYNCFLOW_API_KEY}
      # Tenant configuratie — wijst naar de fake OpenMRS service
      OPENMRS_TENANT_ID: ${OPENMRS_TENANT_ID:-test-ziekenhuis}
      OPENMRS_ORGANIZATION_NAME: ${OPENMRS_ORGANIZATION_NAME:-Test Ziekenhuis}
      OPENMRS_BASE_URL: http://fake-openmrs:8090
      OPENMRS_USERNAME: ${OPENMRS_USERNAME:-admin}
      OPENMRS_PASSWORD: ${OPENMRS_PASSWORD:-admin}
      OPENMRS_NOTIFICATION_PROVIDER: ${OPENMRS_NOTIFICATION_PROVIDER:-SWIFTSEND}
    ports:
      - "8080:8080"
      - "9090:9090"     # Prometheus metrics (if configured)
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

volumes:
  postgres-data:
  rabbitmq-data:

