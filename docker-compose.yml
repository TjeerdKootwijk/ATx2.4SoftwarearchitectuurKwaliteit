services:
  # fake message providers
  # Fake messaging providers (SwiftSend / LegacyLink / AsyncFlow / SecurePost)
  fakeMessageProvider:
    image: ghcr.io/avansict/in2.4-fakecomworld:main
    ports:
      - "1337:8080"

  # Fake OpenMRS REST server — simuleert /ws/rest/v1/appointments voor pipeline-tests
  fake-openmrs:
    build:
      context: ./fake-openmrs
      dockerfile: Dockerfile
    container_name: atx24-fake-openmrs
    environment:
      FAKE_OPENMRS_PORT: 8090
      # New split-group vars (1h-group and 24h-group)
      FAKE_APPOINTMENT_COUNT_1H: ${FAKE_APPOINTMENT_COUNT_1H:-2}
      FAKE_APPOINTMENT_COUNT_24H: ${FAKE_APPOINTMENT_COUNT_24H:-2}
      FAKE_APPOINTMENT_HOURS_1H: ${FAKE_APPOINTMENT_HOURS_1H:-2}
      FAKE_APPOINTMENT_HOURS_24H: ${FAKE_APPOINTMENT_HOURS_24H:-25}
      # Legacy fallbacks (used when COUNT_1H / HOURS_1H not set)
      FAKE_APPOINTMENT_COUNT: ${FAKE_APPOINTMENT_COUNT:-3}
      FAKE_APPOINTMENT_HOURS: ${FAKE_APPOINTMENT_HOURS:-2}
      FAKE_PATIENT_NAME: ${FAKE_PATIENT_NAME:-Test Patient}
      FAKE_APPOINTMENT_LOCATION: ${FAKE_APPOINTMENT_LOCATION:-Polikliniek Kamer 3B}
      FAKE_APPOINTMENT_TYPE: ${FAKE_APPOINTMENT_TYPE:-Consultatie}
      FAKE_APPOINTMENT_STATUS: ${FAKE_APPOINTMENT_STATUS:-Scheduled}
      FAKE_APPOINTMENT_COMMENTS: ${FAKE_APPOINTMENT_COMMENTS:-Nuchter komen}
    ports:
      - "8090:8090"
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: atx24-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: atx24db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: atx24-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atx24-app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      fakeMessageProvider:
        condition: service_started
      lgtm:
        condition: service_started
      fake-openmrs:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/atx24db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      PROVIDERS_BASE_URL: http://fakeMessageProvider:8080
      # OTEL CONFIG (BELANGRIJK)
      OTEL_SERVICE_NAME: atx24-app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_LOGS_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
      PROVIDERS_STUDENT_GROUP: groupc1
      PROVIDERS_SWIFTSEND_API_KEY: your-api-key-here
      PROVIDERS_SECUREPOST_CLIENT_ID: securepost-client-id
      PROVIDERS_SECUREPOST_CLIENT_SECRET: securepost-secret-key
      PROVIDERS_ASYNCFLOW_API_KEY: ${PROVIDERS_ASYNCFLOW_API_KEY}

      # Tenant configuratie — wijst naar de fake OpenMRS service
      OPENMRS_TENANT_ID: ${OPENMRS_TENANT_ID:-test-ziekenhuis}
      OPENMRS_ORGANIZATION_NAME: ${OPENMRS_ORGANIZATION_NAME:-Test Ziekenhuis}
      OPENMRS_BASE_URL: http://fake-openmrs:8090
      OPENMRS_USERNAME: ${OPENMRS_USERNAME:-admin}
      OPENMRS_PASSWORD: ${OPENMRS_PASSWORD:-admin}
      OPENMRS_NOTIFICATION_PROVIDER: ${OPENMRS_NOTIFICATION_PROVIDER:-SWIFTSEND}
      OPENMRS_TIMEZONE: ${OPENMRS_TIMEZONE:-UTC}
      # AES-256 key for encrypting sensitive DB columns (NFR5) — set in .env
      AES_ENCRYPTION_KEY: ${AES_ENCRYPTION_KEY}
      # TLS 1.3 keystore password (NFR5 transport) — set in .env
      SSL_KEYSTORE_PASSWORD: ${SSL_KEYSTORE_PASSWORD:-changeit}
    ports:
      - "8443:8443"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "--no-check-certificate", "-O", "-", "https://localhost:8443/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # Prometheus for RabbitMQ metrics scraping
  prometheus:
    image: prom/prometheus:latest
    container_name: atx24-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      rabbitmq:
        condition: service_healthy

  # LGTM STACK (Grafana + Loki + Tempo + Mimir + OTEL Collector)
  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: lgtm
    ports:
      - "3000:3000"   # Grafana
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./grafana/provisioning/datasources/rabbitmq-prometheus.yml:/otel-lgtm/grafana/conf/provisioning/datasources/rabbitmq-prometheus.yml
      - ./grafana/provisioning/dashboards/rabbitmq-dashboards.yml:/otel-lgtm/grafana/conf/provisioning/dashboards/rabbitmq-dashboards.yml
      - ./grafana/dashboards:/grafana/dashboards
    # Seeder: maakt eenmalig een testpatiënt + afspraak aan bij opstart
  seed-data:
    build:
      context: ./Scripts
      dockerfile: Dockerfile
    container_name: atx24-seed-data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      app:
        condition: service_healthy
    environment:
      OPENMRS_BASE_URL: http://host.docker.internal
    restart: "no"
volumes:
  postgres-data:
  rabbitmq-data: