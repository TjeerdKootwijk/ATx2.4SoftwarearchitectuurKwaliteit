services:
  # fake message providers
  fakeMessageProvider:
    image: ghcr.io/avansict/in2.4-fakecomworld:main
    ports:
      - "1337:8080"

  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: atx24-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: atx24db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: atx24-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atx24-app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      fakeMessageProvider:
        condition: service_started
      lgtm:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/atx24db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      PROVIDERS_BASE_URL: http://fakeMessageProvider:8080

      # 🔥 OTEL CONFIG (BELANGRIJK)
      OTEL_SERVICE_NAME: atx24-app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_LOGS_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp

    ports:
      - "8080:8080"

  # Prometheus for RabbitMQ metrics scraping
  prometheus:
    image: prom/prometheus:latest
    container_name: atx24-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      rabbitmq:
        condition: service_healthy

  # 🔥 LGTM STACK (Grafana + Loki + Tempo + Mimir + OTEL Collector)
  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: lgtm
    ports:
      - "3000:3000"   # Grafana
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./grafana/provisioning/datasources/rabbitmq-prometheus.yml:/otel-lgtm/grafana/conf/provisioning/datasources/rabbitmq-prometheus.yml
      - ./grafana/provisioning/dashboards/rabbitmq-dashboards.yml:/otel-lgtm/grafana/conf/provisioning/dashboards/rabbitmq-dashboards.yml
      - ./grafana/dashboards:/grafana/dashboards


  webhook-tester:
    image: mcr.microsoft.com/powershell
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
    command: >
      pwsh /scripts/test-webhook.ps1

volumes:
  postgres-data:
  rabbitmq-data: