global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "spring-app"
    metrics_path: "/actuator/prometheus"
    scheme: https
    tls_config:
      insecure_skip_verify: true   # self-signed dev cert
    static_configs:
      - targets: ["app:8443"]

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]

  - job_name: "rabbitmq-per-queue"
    metrics_path: "/metrics/per-object"
    static_configs:
      - targets: ["rabbitmq:15692"]