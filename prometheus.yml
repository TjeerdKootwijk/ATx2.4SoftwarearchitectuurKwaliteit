global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "spring-app"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["app:8080"]

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]

  - job_name: "rabbitmq-per-queue"
    metrics_path: "/metrics/per-object"
    static_configs:
      - targets: ["rabbitmq:15692"]